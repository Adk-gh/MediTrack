        .col-detail { flex: 2; background: #ffffff; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

        .exam-item:hover { background: linear-gradient(90deg, #f0f7f6, #ffffff); transform: translateX(2px); }
        .exam-item.active-exam { background: linear-gradient(90deg, var(--meditrack-teal-soft), #ffffff); border-left: 3px solid var(--meditrack-teal); }

        .status-pending { background: #fef3c7; color: #92400e; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-rejected { background: #fee2e2; color: #991b1b; }

        .drawer-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.2); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }

        .drawer-section { padding: 16px 24px; border-bottom: 1px solid #f1f5f9; }
        .drawer-section-title { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; margin-bottom: 10px; }
        .drawer-info-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 12px; color: #475569; }
        .drawer-info-row i { color: var(--meditrack-teal); width: 16px; text-align: center; }
        .drawer-logout-btn { width: calc(100% - 48px); margin: 16px 24px; padding: 10px; background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; }

        /* Snackbar */
        .snackbar { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1e293b; color: white; padding: 14px 24px; border-radius: 12px; font-size: 13px; font-weight: 600; z-index: 9999; transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; gap: 10px; }

        .snackbar.success { background: linear-gradient(135deg, #166534, #15803d); }

        /* Search */
        .records-search { position: relative; }
        .records-search input { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px 12px 8px 34px; font-size: 12px; width: 100%; outline: none; transition: all 0.2s; }

        .records-search i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 12px; }

        .empty-state { flex: 1; display: flex; flex-col items-center justify-center; text-center; py-16; }

        function showSnackbar(msg, type = 'success') {
            const sb = document.getElementById('snackbar');
            sb.className = `snackbar ${type}`;
            sb.innerHTML = `<i class="fa-solid ${type==='success'?'fa-circle-check':'fa-circle-exclamation'}"></i> ${msg}`;
            sb.classList.add('show');
            setTimeout(() => sb.classList.remove('show'), 3500);
        }

        // Render examination list
        function renderExamList(filter = '') {
            const container = document.getElementById('exam-list');
            const filtered = examinations.filter(exam =>
                exam.patientName.toLowerCase().includes(filter.toLowerCase()) ||
                exam.patientId.toLowerCase().includes(filter.toLowerCase())
            );

            if (filtered.length === 0) {
                document.getElementById('no-exam-message').classList.remove('hidden');
                container.innerHTML = '';
                return;
            }

            document.getElementById('no-exam-message').classList.add('hidden');
            container.innerHTML = filtered.map(exam => `
                <div class="exam-item ${selectedExamId === exam.id ? 'active-exam' : ''}" onclick="selectExamination(${exam.id})">
                    <div class="flex justify-between items-start mb-1">
                        <p class="text-sm font-bold text-slate-700">${exam.patientName}</p>
                        <span class="status-badge status-${exam.status}">${exam.status}</span>
                    </div>
                    <p class="text-xs text-slate-500">${exam.patientId} • ${exam.program} ${exam.year}</p>
                    <div class="flex justify-between items-center mt-2">
                        <p class="text-xs text-slate-400"><i class="fa-solid fa-calendar mr-1"></i>${exam.examDate}</p>
                        <p class="text-xs text-slate-400">${exam.reason}</p>
                    </div>
                </div>
            `).join('');

            document.getElementById('exam-count-badge').innerText = filtered.length;
        }

        // Filter examination list
        function filterExamList() {
            const searchTerm = document.getElementById('examSearch').value;
            renderExamList(searchTerm);
        }

        // Select examination
        function selectExamination(id) {
            selectedExamId = id;
            const exam = examinations.find(e => e.id === id);
            if (!exam) return;

            renderExamList(document.getElementById('examSearch').value);

            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('exam-detail-content').classList.remove('hidden');
            document.getElementById('action-buttons').classList.remove('hidden');

            document.getElementById('exam-detail-content').innerHTML = `
                <div class="glass-card p-5 mb-4">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-lg font-bold text-[#466460]">${exam.patientName}</h3>
                            <p class="text-sm text-slate-500">${exam.patientId} • ${exam.type === 'student' ? 'Student' : exam.type === 'instructor' ? 'Faculty' : 'Staff'}</p>
                        </div>
                        <span class="status-badge status-${exam.status}">${exam.status}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><p class="text-xs text-slate-400 uppercase">Program/Department</p><p class="text-sm font-semibold">${exam.program} ${exam.year}</p><p class="text-xs text-slate-500">${exam.department}</p></div>
                        <div><p class="text-xs text-slate-400 uppercase">Examination Date</p><p class="text-sm font-semibold">${exam.examDate}</p></div>
                        <div><p class="text-xs text-slate-400 uppercase">Reason</p><p class="text-sm font-semibold">${exam.reason}</p></div>
                        <div><p class="text-xs text-slate-400 uppercase">Nurse on Duty</p><p class="text-sm font-semibold">${exam.nurseName}</p></div>
                    </div>
                </div>

                <!-- Medical Examination Summary -->
                <div class="glass-card p-5 mb-4">
                    <h4 class="text-sm font-bold text-[#466460] mb-4 uppercase tracking-wide border-b border-slate-200 pb-2">
                        <i class="fa-solid fa-clipboard-list mr-2"></i>Medical Examination Summary
                    </h4>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <p class="text-xs text-slate-400 uppercase mb-1">Date of Examination</p>
                            <p class="text-sm font-semibold">${exam.examDate}</p>
                        </div>
                        <div>
                            <p class="text-xs text-slate-400 uppercase mb-1">Examination Type</p>
                            <p class="text-sm font-semibold">${exam.reason}</p>
                        </div>
                    </div>

                    <!-- Vital Signs -->
                    <div class="mb-4">
                        <p class="text-xs font-bold text-[#466460] uppercase mb-2">Vital Signs</p>
                        <div class="grid grid-cols-5 gap-2">
                            <div class="bg-slate-50 rounded-lg p-2 text-center">
                                <p class="text-[9px] text-slate-400 uppercase">BP</p>
                                <p class="text-sm font-bold text-[#466460]">${exam.vitals?.bp || '120/80'}</p>
                                <p class="text-[8px] text-slate-400">mmHg</p>
                            </div>
                            <div class="bg-slate-50 rounded-lg p-2 text-center">
                                <p class="text-[9px] text-slate-400 uppercase">PR</p>
                                <p class="text-sm font-bold text-[#466460]">${exam.vitals?.pr || '72'}</p>
                                <p class="text-[8px] text-slate-400">bpm</p>
                            </div>
                            <div class="bg-slate-50 rounded-lg p-2 text-center">
                                <p class="text-[9px] text-slate-400 uppercase">RR</p>
                                <p class="text-sm font-bold text-[#466460]">${exam.vitals?.rr || '18'}</p>
                                <p class="text-[8px] text-slate-400">cpm</p>
                            </div>
                            <div class="bg-slate-50 rounded-lg p-2 text-center">
                                <p class="text-[9px] text-slate-400 uppercase">Temp</p>
                                <p class="text-sm font-bold text-[#466460]">${exam.vitals?.temp || '36.5'}</p>
                                <p class="text-[8px] text-slate-400">°C</p>
                            </div>
                            <div class="bg-slate-50 rounded-lg p-2 text-center">
                                <p class="text-[9px] text-slate-400 uppercase">Weight</p>
                                <p class="text-sm font-bold text-[#466460]">${exam.vitals?.weight || '55'}</p>
                                <p class="text-[8px] text-slate-400">kg</p>
                            </div>
                        </div>
                    </div>

                    <!-- Anthropometrics -->
                    <div class="mb-4">
                        <p class="text-xs font-bold text-[#466460] uppercase mb-2">Anthropometrics</p>
                        <div class="grid grid-cols-4 gap-2">
                            <div class="bg-slate-50 rounded-lg p-2">
                                <p class="text-[9px] text-slate-400 uppercase">Height</p>
                                <p class="text-sm font-semibold">${exam.anthropometrics?.height || '160'} cm</p>
                            </div>
                            <div class="bg-slate-50 rounded-lg p-2">
                                <p class="text-[9px] text-slate-400 uppercase">Weight</p>
                                <p class="text-sm font-semibold">${exam.anthropometrics?.weight || '55'} kg</p>
                            </div>
                            <div class="bg-slate-50 rounded-lg p-2">
                                <p class="text-[9px] text-slate-400 uppercase">BMI</p>
                                <p class="text-sm font-semibold">${exam.anthropometrics?.bmi || '21.5'}</p>
                            </div>
                            <div class="bg-slate-50 rounded-lg p-2">
                                <p class="text-[9px] text-slate-400 uppercase">Waist</p>
                                <p class="text-sm font-semibold">${exam.anthropometrics?.waist || '72'} cm</p>
                            </div>
                        </div>
                    </div>

                    <!-- Medical History -->
                    <div class="mb-4">
                        <p class="text-xs font-bold text-[#466460] uppercase mb-2">Past Medical History</p>
                        <div class="flex flex-wrap gap-1">
                            ${(exam.medicalHistory || ['No significant medical history']).map(h => `<span class="bg-amber-50 text-amber-700 px-2 py-1 rounded-full text-[10px] font-semibold">${h}</span>`).join('')}
                        </div>
                    </div>

                    <!-- Surgical History -->
                    <div class="mb-4">
                        <p class="text-xs font-bold text-[#466460] uppercase mb-2">Surgical History</p>
                        <div class="flex flex-wrap gap-1">
                            ${(exam.surgicalHistory || ['No surgical history']).map(h => `<span class="bg-blue-50 text-blue-700 px-2 py-1 rounded-full text-[10px] font-semibold">${h}</span>`).join('')}
                        </div>
                    </div>

                    <!-- Family History -->
                    <div class="mb-4">
                        <p class="text-xs font-bold text-[#466460] uppercase mb-2">Family History</p>
                        <div class="flex flex-wrap gap-1">
                            ${(exam.familyHistory || ['No significant family history']).map(h => `<span class="bg-purple-50 text-purple-700 px-2 py-1 rounded-full text-[10px] font-semibold">${h}</span>`).join('')}
                        </div>
                    </div>

                    <!-- COVID-19 Vaccine -->
                    <div class="mb-4">
                        <p class="text-xs font-bold text-[#466460] uppercase mb-2">COVID-19 Vaccine</p>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="bg-slate-50 rounded-lg p-2">
                                <p class="text-[9px] text-slate-400 uppercase">1st Dose</p>
                                <p class="text-xs font-semibold">${exam.vaccine?.dose1 || 'Pfizer'}</p>
                                <p class="text-[9px] text-slate-400">${exam.vaccine?.dose1Date || '2023-03-15'}</p>
                            </div>
                            <div class="bg-slate-50 rounded-lg p-2">
                                <p class="text-[9px] text-slate-400 uppercase">2nd Dose</p>
                                <p class="text-xs font-semibold">${exam.vaccine?.dose2 || 'Pfizer'}</p>
                                <p class="text-[9px] text-slate-400">${exam.vaccine?.dose2Date || '2023-04-15'}</p>
                            </div>
                            <div class="bg-slate-50 rounded-lg p-2">
                                <p class="text-[9px] text-slate-400 uppercase">Booster</p>
                                <p class="text-xs font-semibold">${exam.vaccine?.booster || 'Moderna'}</p>
                                <p class="text-[9px] text-slate-400">${exam.vaccine?.boosterDate || '2023-10-01'}</p>
                            </div>
                        </div>
                    </div>

                    <!-- Laboratory Results -->
                    <div class="mb-4">
                        <p class="text-xs font-bold text-[#466460] uppercase mb-2">Laboratory Results</p>
                        <div class="overflow-x-auto">
                            <table class="w-full text-xs border border-slate-200 rounded-lg">
                                <thead class="bg-slate-50">
                                    <tr>
                                        <th class="text-left p-2 border-b font-semibold text-slate-600">Test</th>
                                        <th class="text-left p-2 border-b font-semibold text-slate-600">Results</th>
                                        <th class="text-left p-2 border-b font-semibold text-slate-600">Facility</th>
                                        <th class="text-left p-2 border-b font-semibold text-slate-600">Date</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td class="p-2 border-b">CBC</td>
                                        <td class="p-2 border-b font-semibold">${exam.labResults?.cbc || 'WBC: 7.2, RBC: 4.8, Hgb: 14.2, Hct: 42%'}</td>
                                        <td class="p-2 border-b">${exam.labResults?.cbcFacility || 'PLSP Clinic Lab'}</td>
                                        <td class="p-2 border-b">${exam.examDate}</td>
                                    </tr>
                                    <tr>
                                        <td class="p-2 border-b">Urinalysis</td>
                                        <td class="p-2 border-b font-semibold">${exam.labResults?.ua || 'Color: Yellow, pH: 6.0, Specific Gravity: 1.020'}</td>
                                        <td class="p-2 border-b">${exam.labResults?.uaFacility || 'PLSP Clinic Lab'}</td>
                                        <td class="p-2 border-b">${exam.examDate}</td>
                                    </tr>
                                    <tr>
                                        <td class="p-2">Chest X-Ray</td>
                                        <td class="p-2 font-semibold">${exam.labResults?.xray || 'No active cardiopulmonary disease'}</td>
                                        <td class="p-2">${exam.labResults?.xrayFacility || 'San Pablo Medical Center'}</td>
                                        <td class="p-2">${exam.examDate}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Personal/Social History -->
                    <div class="mb-2">
                        <p class="text-xs font-bold text-[#466460] uppercase mb-2">Personal/Social History</p>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-slate-500">Smoking:</span>
                                <span class="text-xs font-semibold ${exam.social?.smoking === 'Yes' ? 'text-red-600' : 'text-green-600'}">${exam.social?.smoking || 'No'}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-slate-500">Alcohol:</span>
                                <span class="text-xs font-semibold ${exam.social?.alcohol === 'Yes' ? 'text-red-600' : 'text-green-600'}">${exam.social?.alcohol || 'No'}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-slate-500">Illicit Drugs:</span>
                                <span class="text-xs font-semibold ${exam.social?.drugs === 'Yes' ? 'text-red-600' : 'text-green-600'}">${exam.social?.drugs || 'No'}</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Medical Certificate Section -->
                <div class="certificate-container">
                    <div class="flex justify-between items-start mb-8 relative z-10">
                        <div>
                            <div class="header-logo mb-2" style="color: var(--meditrack-teal); font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 8px;">
                                <i class="fa-solid fa-house-medical"></i> MediTrack
                            </div>
                            <div class="text-[9px] text-slate-500 uppercase font-bold tracking-widest leading-tight">
                                Pamantasan ng Lungsod ng San Pablo<br>
                                Health Services Office<br>
                                Brgy. San Jose, San Pablo City
                            </div>
                        </div>
                        <div class="text-right text-[9px] text-slate-400">
                            <p>Tel: (049) 536-7830</p>
                            <p>plspofficial@plsp.edu.ph</p>
                        </div>
                    </div>

                    <div class="text-center mb-8">
                        <h1 class="text-2xl font-black text-slate-800 tracking-tight m-0">MEDICAL CERTIFICATE</h1>
                        <div class="h-1 w-16 bg-[#e07a5f] mx-auto mt-2 rounded-full"></div>
                    </div>

                    <div class="text-slate-700 leading-relaxed relative z-10 text-xs md:text-sm">
                        <p class="font-extrabold text-slate-900 mb-4 uppercase tracking-wider text-xs">To whom it may concern:</p>

                        <p class="mb-6">
                            This is to certify that Mr./Ms. <span class="field-underline" style="width: 180px;">${exam.patientName.split(',')[1] || ''} ${exam.patientName.split(',')[0] || ''}</span>,
                            <span class="field-underline" style="width: 30px;">21</span> years old,
                            <span class="field-underline" style="width: 60px;">Male/Female</span> (Gender),
                            residing at <span class="field-underline" style="width: 200px;"></span>
                            and currently enrolled as <span class="field-underline" style="width: 160px;">${exam.program} ${exam.year}</span>
                            (Course/Year/Section) was seen and examined by the undersigned health officer on this date
                            <span class="field-underline" style="width: 90px;">${exam.examDate}</span>.
                        </p>

                        <div class="mb-6">
                            <p class="font-bold text-slate-900 mb-2 uppercase text-xs tracking-wider">Pertinent Findings:</p>
                            <div class="flex items-center mb-2">
                                <div class="custom-checkbox checked"></div>
                                <span class="text-xs font-medium">Essentially normal findings at date and time of examination.</span>
                            </div>
                        </div>

                        <div class="mb-6">
                            <p class="font-bold text-slate-900 mb-2 uppercase text-xs tracking-wider">Remarks & Recommendations:</p>
                            <div class="remark-box text-slate-600 text-xs">
                                <textarea id="cert-remarks" class="w-full border-none bg-transparent text-xs resize-none focus:outline-none" rows="3" placeholder="Enter remarks and recommendations..."></textarea>
                            </div>
                        </div>

                        <div class="flex items-center mb-8">
                            <div class="custom-checkbox checked"></div>
                            <span class="text-xs font-black text-slate-900">PHYSICALLY FIT / FIT TO JOIN OFF-CAMPUS ACTIVITY</span>
                        </div>
                    </div>

                    <div class="flex justify-end mt-12 relative z-10">
                        <div class="text-center w-56">
                            <div class="mb-2 font-black text-slate-900 border-b-2 border-slate-900 pb-1 uppercase text-xs">
                                Caren Navata Jose, M.D.
                            </div>
                            <p class="text-xs font-bold text-teal-800 uppercase m-0">Medical Officer III</p>
                            <div class="text-[9px] text-slate-500 mt-1">
                                <p>License No. 0114665</p>
                                <p>PTR No. 9978569</p>
                            </div>
                        </div>
                    </div>

                    <div class="mt-12 text-center italic text-slate-400 text-xs font-medium">
                        "Primed to Lead and Serve for Progress"
                    </div>

                    <table class="footer-metadata">
                        <tr>
                            <td class="font-bold bg-slate-50">PLSP-OSDS-HSO</td>
                            <td>Rev. No: 2</td>
                            <td class="font-bold bg-slate-50">Effective Date</td>
                            <td>February 2023</td>
                            <td>Page 1 of 1</td>
                        </tr>
                    </table>
                </div>

                <!-- Submit Button -->
                <div class="mt-6 flex justify-end gap-3 pb-8">
                    <button class="btn-edit" onclick="editExamination()"><i class="fa-solid fa-pen-to-square mr-1"></i> Edit Certificate</button>
                    <button class="btn-submit" onclick="submitExamination()"><i class="fa-solid fa-paper-plane mr-1"></i> Submit Approval</button>
                </div>
            `;
        }

        // Approve examination
        function approveExamination() {
            const exam = examinations.find(e => e.id === selectedExamId);
            if (exam) {
                exam.status = 'approved';
                showSnackbar(`Examination for ${exam.patientName} has been approved!`, 'success');
                renderExamList(document.getElementById('examSearch').value);
                selectExamination(selectedExamId);
            }
        }

        // Edit examination
        function editExamination() {
            showSnackbar('Editing examination details...', 'success');
        }

        // Submit examination
        function submitExamination() {
            const exam = examinations.find(e => e.id === selectedExamId);
            const remarks = document.getElementById('cert-remarks')?.value || '';
            if (exam && remarks.trim()) {
                exam.status = 'approved';
                exam.remarks = remarks;
                showSnackbar(`Examination for ${exam.patientName} submitted successfully!`, 'success');
                renderExamList(document.getElementById('examSearch').value);
            } else if (!remarks.trim()) {
                showSnackbar('Please add remarks before submitting', 'error');
            }
        }

        // Initialize
        function init() {
            renderExamList();
        }

        window.onload = init;
    </script>
</body>
</html>
